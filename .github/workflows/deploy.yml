name: Deploy Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore authentication
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Debug
        run: |
          echo "Node:"
          node -v

          echo "Clasp:"
          clasp -v

          echo "Files:"
          ls -la

          echo "Manifest:"
          cat appsscript.json

          echo "Status:"
          clasp status

      - name: Push
        run: clasp push --force

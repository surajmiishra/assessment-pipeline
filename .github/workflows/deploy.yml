name: Deploy Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install clasp
      - name: Install clasp
        run: npm install -g @google/clasp

      # Restore authentication from GitHub Secret
      - name: Restore authentication
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json

      # Validate JSON
      - name: Validate authentication JSON
        shell: bash
        run: |
          echo "===== First 3 lines of ~/.clasprc.json ====="
          head -3 ~/.clasprc.json

          echo ""
          echo "===== Validating JSON ====="
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME+'/.clasprc.json','utf8')); console.log('✅ JSON OK');"

      # Show environment information
      - name: Debug environment
        shell: bash
        run: |
          echo "===== Node Version ====="
          node -v

          echo ""
          echo "===== npm Version ====="
          npm -v

          echo ""
          echo "===== clasp Version ====="
          clasp -v

          echo ""
          echo "===== Repository Files ====="
          ls -la

          echo ""
          echo "===== appsscript.json ====="
          cat appsscript.json

          echo ""
          echo "===== clasp Status ====="
          clasp status

      # Push to Apps Script
      - name: Deploy to Apps Script
        shell: bash
        run: |
          clasp push --force
